<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herbalife Goal Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <header class="glass-nav border-b border-slate-200 sticky top-0 z-20">
    <div class="max-w-5xl mx-auto p-4 flex justify-between items-center">
      <h1 class="font-extrabold text-xl">Herbalife Goal Planner</h1>
      <span id="statusBadge" class="text-xs font-bold px-3 py-1 rounded-full bg-slate-200 text-slate-700">Standby</span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-4 md:p-6 space-y-5">
    <section id="authSection" class="card bg-white p-5 md:p-6">
      <h2 class="text-lg font-extrabold mb-4">Member / Child Verification</h2>

      <label class="flex items-center gap-2 mb-3 text-sm">
        <input id="childCheckbox" type="checkbox" class="accent-green-700" />
        <span>Agar user child hai to checkbox on karo (Member ID nahi chahiye)</span>
      </label>

      <input id="memberIdInput" type="text" placeholder="Member ID enter karein" class="w-full border border-slate-300 rounded-xl p-3 mb-3" />

      <button id="loadPlanBtn" class="w-full rounded-xl bg-green-700 hover:bg-green-800 text-white font-bold p-3">Load User Plan</button>

      <p id="errorText" class="hidden text-red-600 text-sm mt-3"></p>
    </section>

    <section id="dashboardSection" class="hidden space-y-5">
      <div class="card coach-gradient text-white p-5 md:p-6">
        <h3 id="profileName" class="text-2xl font-extrabold">---</h3>
        <p id="profileInfo" class="text-xs mt-1 opacity-90">---</p>
        <p id="profileGoalLine" class="text-sm mt-3">---</p>
      </div>

      <div class="grid grid-cols-3 gap-2 bg-slate-200 p-1 rounded-2xl">
        <button class="tab-btn tab-active" data-tab="diet">Diet Plan</button>
        <button class="tab-btn" data-tab="tasks">Daily Tasks</button>
        <button class="tab-btn" data-tab="reports">Reports</button>
      </div>

      <section id="tab-diet" class="tab-panel space-y-3"></section>

      <section id="tab-tasks" class="tab-panel hidden space-y-4">
        <div id="taskList" class="space-y-2"></div>

        <div class="card bg-white p-4">
          <div class="flex justify-between text-sm font-bold">
            <span>Progress</span>
            <span id="progressLabel">0%</span>
          </div>
          <div class="w-full h-2 bg-slate-200 rounded mt-2 overflow-hidden">
            <div id="progressBar" class="h-full bg-indigo-600" style="width:0%"></div>
          </div>
        </div>
      </section>

      <section id="tab-reports" class="tab-panel hidden space-y-4">
        <div class="card bg-white p-4">
          <h4 class="font-extrabold mb-2">Daily Calendar Report</h4>
          <div id="calendarReport" class="space-y-2 text-sm"></div>
        </div>

        <div class="card bg-white p-4">
          <h4 class="font-extrabold mb-2">Daily Completion Graph (7 Days)</h4>
          <canvas id="dailyGraph" height="120"></canvas>
        </div>

        <div class="card bg-white p-4">
          <h4 class="font-extrabold mb-2">Monthly Completion Graph</h4>
          <canvas id="monthlyGraph" height="120"></canvas>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
