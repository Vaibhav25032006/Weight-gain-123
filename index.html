<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbalife Smart App</title>
    <style>
        :root { --primary: #1b4d3e; --accent: #8bc34a; }
        body { margin: 0; font-family: sans-serif; background: #f4f7f5; padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .task-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .task-time { font-weight: bold; color: var(--primary); }
        .download-banner { background: #fff3cd; padding: 12px; text-align: center; border-bottom: 2px solid #ffeeba; }
        .btn { background: var(--accent); color: white; padding: 8px 16px; text-decoration: none; border-radius: 6px; font-weight: bold; display: inline-block; margin-top: 5px; }
        .footer-btn { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; text-align: center; padding: 15px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="download-banner">
        <p style="margin: 0; font-weight: bold; color: #856404;">⚠️ आवश्यक सूचना: बैकग्राउंड अलार्म एक्टिवेट करने के लिए नीचे से क्लॉक सपोर्ट फाइल लें।</p>
        <a href="clock_support_file.apk" download class="btn">Download Clock Support</a>
    </div>

    <header>
        <h2>HERBALIFE WEIGHT GAIN APP</h2>
        <p id="clock-status-banner" style="margin: 5px 0 0 0; font-size: 13px; color: #ffeb3b;">घड़ी को सिंक किया जा रहा है...</p>
    </header>

    <div class="container">
        <div class="card">
            <h3>📅 प्रोग्रेस कैलेंडर</h3>
            <input type="date" id="app-calendar" style="width:100%; padding:8px; font-size:16px;">
        </div>

        <div class="card">
            <h3>⏰ अलार्म शेड्यूलर की स्थिति</h3>
            <div id="timeline-container"></div>
        </div>
    </div>

    <a href="https://herbalife-smart-wellness-studio.my.canva.site/page-3" class="footer-btn">
        ⬅️ मुख्य वेबसाइट पर वापस जाएं
    </a>

    <script src="app.js"></script>
</body>
</html>
